<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomzon Payaza Payment Test</title>
    <style>
        :root {
            --primary: #003B95;
            --primary-hover: #002a70;
            --bg: #f7f8fa;
            --card-bg: #ffffff;
            --text: #111111;
            --text-secondary: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .payment-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .amount {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .currency {
            font-size: 16px;
            font-weight: 600;
            vertical-align: middle;
            margin-right: 4px;
        }

        #pay-button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 59, 149, 0.2);
        }

        #pay-button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 59, 149, 0.3);
        }

        #pay-button:active {
            transform: translateY(0);
        }

        #pay-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }

        .error { color: #d93025; }
        .success { color: #1e8e3e; }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            margin: 0 auto;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">💠</span>
        <h1>Bloomzon Checkout</h1>
        <p>Complete your purchase securely via Payaza.</p>
        
        <div class="payment-info">
            <span class="currency">NGN</span>
            <span class="amount">5,000</span>
        </div>

        <button id="pay-button">
            <span id="button-text">Pay Now</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="message"></div>
    </div>

    <script>
        const payButton = document.getElementById('pay-button');
        const buttonText = document.getElementById('button-text');
        const loader = document.getElementById('loader');
        const message = document.getElementById('message');

        payButton.addEventListener('click', async () => {
            // Reset state
            message.textContent = '';
            message.className = '';
            payButton.disabled = true;
            buttonText.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Prepare test payload
                const payload = {
                    amount: 5000,
                    currency: 'NGN',
                    email: 'test-user@example.com',
                    name: 'Test User',
                    phone: '08012345678',
                    tx_ref: 'BLM-' + Date.now(),
                    order_id: 'ORDER-' + Math.floor(Math.random() * 1000),
                    user_id: 'USER-123',
                    redirect_url: window.location.origin + window.location.pathname // Base URL without query params
                };

                const response = await fetch('/api/payaza/initialize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success && data.payment_url) {
                    message.textContent = 'Redirecting to payment gateway...';
                    message.className = 'success';
                    // Small delay to let the user see the message
                    setTimeout(() => {
                        window.location.href = data.payment_url;
                    }, 1000);
                } else {
                    throw new Error(data.message || 'Failed to initialize payment');
                }
            } catch (error) {
                console.error('Error:', error);
                message.textContent = error.message;
                message.className = 'error';
                payButton.disabled = false;
                buttonText.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        // Check for redirect status
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('status')) {
            const status = urlParams.get('status');
            if (status === 'successful' || status === 'Completed' || status === 'paid') {
                message.textContent = 'Payment successful! Thank you.';
                message.className = 'success';
            } else if (status === 'cancelled') {
                message.textContent = 'Payment was cancelled.';
                message.className = 'error';
            } else {
                message.textContent = 'Payment status: ' + status;
            }
        }
    </script>
</body>
</html>
